# AgentFlow 应用配置
#
# 使用指南：
# - 将此文件复制为 `config.yaml`，并按你的环境进行定制
# - 该配置文件默认路径为当前工作目录下的 `config.yaml`。
#   也可以通过 `DEER_FLOW_CONFIG_PATH` 环境变量指定其他路径。
# - 所有字段值都支持环境变量。示例：`api_key: $OPENAI_API_KEY`
# - `use` 路径是一个字符串，格式类似："package_name.sub_package_name.module_name:class_name/variable_name"。

