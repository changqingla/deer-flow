# Agent-flow 开发环境
# 用法：docker-compose -f docker-compose-dev.yaml up --build
#
# 服务列表：
#   - nginx：反向代理（端口 2026）
#   - gateway：后端 Gateway API（端口 8001）
#   - langgraph：LangGraph 服务（端口 2024）
#   - provisioner（可选）：沙箱调度器（在宿主 Kubernetes 中创建 Pod）
#
# 前置条件：
#   - 仅在使用 provisioner 模式时需要 Kubernetes 集群与 kubeconfig。
#
# 访问地址：http://0.0.0.0:2026（本机也可使用 http://localhost:2026）

services:
  # ── 沙箱调度器 ───────────────────────────────────────────────────────────
  # 通过 K8s API 在宿主 Kubernetes 集群中管理每个沙箱对应的 Pod 与 Service 生命周期。
  # 后端通过 host.docker.internal:{NodePort} 直接访问沙箱实例。
  provisioner:
    profiles:
      - provisioner
    build:
      context: ./provisioner
      dockerfile: Dockerfile
    container_name: agent-flow-provisioner
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      - K8S_NAMESPACE=agent-flow
      - SANDBOX_IMAGE=enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
      # K8s HostPath 卷的宿主机路径（必须为 K8s 节点可访问的绝对路径）。
      # 在 Docker Desktop/OrbStack 上，请使用真实宿主路径，例如 /Users/username/...。
      # 在运行 docker-compose 之前，请先在 shell 中设置：
      #   export AGENT_FLOW_ROOT=/absolute/path/to/Agent-flow
      - SKILLS_HOST_PATH=${AGENT_FLOW_ROOT}/skills
      - THREADS_HOST_PATH=${AGENT_FLOW_ROOT}/backend/.agent-flow/threads
      - KUBECONFIG_PATH=/root/.kube/config
      - NODE_HOST=host.docker.internal
      # 覆盖 K8S API Server 地址。因为 kubeconfig 常写 127.0.0.1，
      # 容器内无法直接访问该地址。
      - K8S_API_SERVER=https://host.docker.internal:26443
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agent-flow-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── 反向代理 ────────────────────────────────────────────────────────────
  # 将 API 流量转发到 gateway/langgraph，并按需转发 provisioner。
  # 通过 NGINX_CONF 选择 nginx 配置：
  # - nginx.local.conf（默认）：不包含 provisioner 路由（local/aio 模式）
  # - nginx.conf：包含 provisioner 路由（provisioner 模式）
  nginx:
    image: ysy.harbor/public/nginx:latest
    container_name: agent-flow-nginx
    ports:
      - "0.0.0.0:2026:2026"
    volumes:
      - ./nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - langgraph
    networks:
      - agent-flow-dev
    restart: unless-stopped

  # 后端 - Gateway API
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: agent-flow-gateway
    command: sh -c "cd backend && uv run uvicorn src.gateway.app:app --host 0.0.0.0 --port 8001 --reload --reload-include='*.yaml .env' > /app/logs/gateway.log 2>&1"
    volumes:
      - ../backend/:/app/backend/
      - gateway-venv:/app/backend/.venv
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json
      - ../skills:/app/skills
      - ../logs:/app/logs
      - ~/.cache/uv:/root/.cache/uv
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    environment:
      - CI=true
      - AGENT_FLOW_HOST_BASE_DIR=${AGENT_FLOW_ROOT}/backend/.agent-flow
      - AGENT_FLOW_HOST_SKILLS_PATH=${AGENT_FLOW_ROOT}/skills
      - AGENT_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agent-flow-dev
    restart: unless-stopped

  # 后端 - LangGraph 服务
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: agent-flow-langgraph
    command: sh -c "cd backend && uv run langgraph dev --no-browser --allow-blocking --host 0.0.0.0 --port 2024 > /app/logs/langgraph.log 2>&1"
    volumes:
      - ../backend/:/app/backend/
      - langgraph-venv:/app/backend/.venv
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json
      - ../skills:/app/skills
      - ../logs:/app/logs
      - ~/.cache/uv:/root/.cache/uv
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    environment:
      - CI=true
      - AGENT_FLOW_HOST_BASE_DIR=${AGENT_FLOW_ROOT}/backend/.agent-flow
      - AGENT_FLOW_HOST_SKILLS_PATH=${AGENT_FLOW_ROOT}/skills
      - AGENT_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agent-flow-dev
    restart: unless-stopped

volumes:
  gateway-venv:
  langgraph-venv:

networks:
  agent-flow-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.200.0/24
